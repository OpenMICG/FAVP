datasets:
  slake:
    data_type: images # [images|videos|features]

    build_info:
      annotations:
        train:
          url:
              - https://huggingface.co/datasets/BoKelvin/SLAKE/blob/main/train.json
          storage:
              - /data/tongzixuan/dataset/slake/train.json
        val:
          url:
             - https://huggingface.co/datasets/BoKelvin/SLAKE/blob/main/validation.json
          storage:
              - /data/tongzixuan/dataset/slake/validation.json
        test:
          url:
              - https://huggingface.co/datasets/BoKelvin/SLAKE/blob/main/test.json
          storage:
              - /data/tongzixuan/dataset/slake/test.json
      images:
          storage: /data/tongzixuan/dataset/slake/imgs
