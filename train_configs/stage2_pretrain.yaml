model:
  arch: favp
  model_type: pretrain_vicuna0

  max_txt_len: 160
  end_sym: "###"
  prompt_path: ""
  prompt_template: '###Human: {} ###Assistant: '
  ckpt: "/data/tongzixuan/outputs/FAVP/stage1/20250422132/checkpoint_0.pth"
  freeze_vit: True
  freeze_qformer: False
  q_former_model: "https://storage.googleapis.com/sfr-vision-language-research/LAVIS/models/BLIP2/blip2_pretrained_flant5xxl.pth"
  vit_model: "eva_clip_g"
  vit_lora_r: 4
  vit_lora_alpha: 8

datasets:
  pmc_vqa:
    batch_size: 2
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 224
    text_processor:
      train:
        name: "blip_caption"

run:
  task: image_text_pretrain
  # optimizer
  lr_sched: "linear_warmup_cosine_lr"
  init_lr: 3e-5
  min_lr: 1e-5
  warmup_lr: 1e-6

  weight_decay: 0.05
  max_epoch: 1
  num_workers: 4
  warmup_steps: 200

  seed: 42
  output_dir: "/data/tongzixuan/outputs/FAVP/stage2"

  amp: True
  resume_ckpt_path: null

  evaluate: False
  train_splits: ["train"]

  device: "cuda"
  world_size: 1
  dist_url: "env://"
  distributed: True
